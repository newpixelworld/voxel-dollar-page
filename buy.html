<!DOCTYPE html>
<html lang="en">
<head>
    <title>Buy Voxel - $1 PayPal</title>
    <script src="https://www.paypal.com/sdk/js?client-id=YOUR_PAYPAL_CLIENT_ID¤cy=USD"></script>
    <style> body { font-family: Arial; text-align: center; padding: 50px; background: #111; color: white; } input, canvas { margin: 10px; } #paypal-button { margin: 20px; } </style>
</head>
<body>
    <h1>🌐 Checkout Voxel</h1>
    <p>Selected Voxel: <span id="voxelInfo">From viewer</span></p>
    <input type="file" id="logoUpload" accept="image/*">
    <canvas id="logoPreview" width="100" height="100" style="border:1px solid white;"></canvas>
    <div id="paypal-button-container"></div>
    
    <script>
        paypal.Buttons({
            createOrder: function(data, actions) {
                return actions.order.create({
                    purchase_units: [{
                        amount: { value: '1.00' }
                    }]
                });
            },
            onApprove: async function(data) {
                // TODO: upload logo a Imgur/Cloudinary → aggiungi config.json → git push
                alert('✅ PAID! Logo uploaded. Voxel live in 5min. Check viewer!');
                window.location.href = 'index.html';
            }
        }).render('#paypal-button-container');
    </script>
    <a href="index.html" style="color: lime; font-size: 24px;">← Back to Viewer</a>
</body>
</html>
