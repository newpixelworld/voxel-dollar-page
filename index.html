<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>VoxelDollarPage (Prototype)</title>
  <style>
    body { margin:0; overflow:hidden; font-family: Arial, sans-serif; background:#0b0f14; }
    #ui {
      position: fixed; top: 12px; left: 12px; z-index: 10;
      color: #fff; background: rgba(0,0,0,.6); padding: 12px 14px; border-radius: 10px;
      width: 320px;
    }
    #ui button { cursor:pointer; padding:10px 12px; border:0; border-radius:8px; }
    #payBtn { background:#35c46a; color:#0b0f14; font-weight:700; width: 100%; margin-top: 8px; }
    #clearBtn { background:#2b3440; color:#fff; width: 100%; margin-top: 8px; }
    .hint { font-size: 12px; opacity: .85; line-height: 1.35; }
    .value { font-family: ui-monospace, Menlo, Monaco, Consolas, monospace; }
    .selectBox { border: 1px solid #55aaff; background: rgba(75,160,255,.25); position: fixed; pointer-events: none; }
  </style>
</head>
<body>
  <div id="ui">
    <div><b>Drag to select a voxel block</b></div>
    <div class="hint">Hold left mouse button and drag a rectangle. Release to finalize selection.</div>
    <hr style="border:0;border-top:1px solid rgba(255,255,255,.12);margin:10px 0;">
    <div>Selection (min→max):</div>
    <div class="value" id="selTxt">None</div>
    <div style="margin-top:8px;">Voxels: <span class="value" id="qty">0</span> · Price: <span class="value" id="price">€0</span></div>
    <button id="payBtn" disabled>Pay with Revolut (manual)</button>
    <button id="clearBtn">Clear</button>
    <div class="hint" style="margin-top:10px;">
      Payment goes to: <span class="value">https://revolut.me/francelqup</span><br>
      After paying, you’ll send the note shown here.
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
