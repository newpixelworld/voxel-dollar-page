<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>VoxelDollarPage - Debug</title>
  <style>
    body { margin:0; overflow:hidden; background:#0b0f14; font-family: Arial, sans-serif; }
    #dbg {
      position:fixed; bottom:12px; left:12px; z-index:9999;
      background:rgba(0,0,0,.75); color:#fff; padding:10px 12px; border-radius:10px;
      max-width: 520px; font-size: 12px; line-height: 1.35;
      border: 1px solid rgba(255,255,255,.15);
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div id="dbg">Loading…</div>

<script type="module">
  const dbg = (msg) => document.getElementById('dbg').textContent = msg;

  try {
    dbg("Step 1: importing three…");

    // IMPORTANT: use the exact same version for all imports
    const THREE = await import("https://unpkg.com/three@0.167.1/build/three.module.js");
    const { OrbitControls } = await import("https://unpkg.com/three@0.167.1/examples/jsm/controls/OrbitControls.js");

    dbg("Step 2: creating scene…");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0b0f14);

    const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 2000);
    camera.position.set(120, 120, 120);

    const renderer = new THREE.WebGLRenderer({ antialias:true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const dir = new THREE.DirectionalLight(0xffffff, 1.0);
    dir.position.set(1, 2, 1);
    scene.add(dir);

    // BIG RED cube so it's impossible to miss
    const cube = new THREE.Mesh(
      new THREE.BoxGeometry(80, 80, 80),
      new THREE.MeshStandardMaterial({ color: 0xff3333, metalness: 0.1, roughness: 0.6 })
    );
    scene.add(cube);

    // And edges overlay
    const edges = new THREE.LineSegments(
      new THREE.EdgesGeometry(new THREE.BoxGeometry(100,100,100)),
      new THREE.LineBasicMaterial({ color: 0x7dd3fc })
    );
    scene.add(edges);

    dbg("OK ✅ If you see a red cube, Three.js works.\nNext we re-add selection.");

    function animate(){
      controls.update();
      cube.rotation.y += 0.004;
      cube.rotation.x += 0.002;
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    animate();

    addEventListener("resize", () => {
      camera.aspect = innerWidth/innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

  } catch (err) {
    dbg("ERROR ❌ Three.js did not start.\n\n" + (err?.stack || err));
  }
</script>
</body>
</html>
